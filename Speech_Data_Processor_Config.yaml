processors:

  - _target_: sdp.processors.SubMakeLowercase
    text_key: "text"


  - _target_: sdp.processors.SubRegex
    text_key: "text"
    regex_params_list:
      - {pattern: "艧", repl: "葯"}
      - {pattern: "牛", repl: "葲"}
      - {pattern: "[茅猫锚毛]", repl: "e"}
      - {pattern: "[铆矛茂]", repl: "i"}
      - {pattern: "[贸貌么枚]", repl: "o"}
      - {pattern: "[煤霉没眉]", repl: "u"}
      - {pattern: "[谩脿盲]", repl: "a"}
      - {pattern: "[莽膰膷]", repl: "c"}
      - {pattern: "[膽]", repl: "d"}
      - {pattern: "[拧]", repl: "葯"}
      - {pattern: "[^a-z膬芒卯葯葲\\s\\-]", repl: ""}


  - _target_: sdp.processors.DropNonAlphabet
    text_key: "text"
    alphabet: "abcdefghijklmnopqrstuvwxyz膬芒卯葯葲 -"

  

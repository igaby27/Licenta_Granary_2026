name: "FastConformer_CTC_XLARGE-10kh-v2"

# use `init_from_nemo_model` or `init_from_pretrained_model` to initialize the model
# We do not currently support `init_from_ptl_ckpt` to create a single script for all types of models.
#init_from_nemo_model: "/home/gion/SpeD-ParakeetRo_110M_TDT-CTC.nemo" # path to nemo model
init_from_pretrained_model: nvidia/stt_en_fastconformer_ctc_xlarge
model:
  sample_rate: 16000
  grad_checkpointing: true

  train_ds:
    manifest_filepath: "/home/gion/Tarred_Data/tarred_10k/sharded_manifests/manifest_{0..511}.json"
    sample_rate: ${model.sample_rate}
    #batch_size: 8 # you may increase batch_size if your memory allows
    shuffle: true
    num_workers: 16
    pin_memory: true
    max_duration: 30.1
    min_duration: 5


    #pentru lhotse
    use_lhotse: true
    batch_duration: 500
    quadratic_duration: 30.0
    num_buckets: 30
    bucket_duration_bins: [17.1,19.15,21.25,23.35,25.45,27.45,29.5,30.0,30.0,30.0,30.0,30.0,30.0,30.0,30.0,30.0,30.0,30.0,30.0,30.0,30.0,30.0,30.0,30.0,30.0,30.0,30.0,30.0,30.0]
    
    num_cuts_for_bins_estimate: 10000
    bucket_buffer_size: 10000
    shuffle_buffer_size: 12500


    # tarred datasets
    is_tarred: true
    tarred_audio_filepaths: "/home/gion/Tarred_Data/tarred_10k/audio_{0..511}.tar"
    shuffle_n: 2048
    # bucketing params
    #bucketing_strategy: "synced_randomized"
    #bucketing_batch_size: 8

  validation_ds:
    manifest_filepath: /home/gion/processed_manifests/train_manifests/dev.jsonl
    sample_rate: ${model.sample_rate}
    batch_size: 8
    shuffle: false
    use_start_end_token: false
    num_workers: 8
    pin_memory: true

  test_ds:
    manifest_filepath: null
    sample_rate: ${model.sample_rate}
    batch_size: 8
    shuffle: false
    use_start_end_token: false
    num_workers: 8
    pin_memory: true
  
  char_labels: # use for char based models
    update_labels: false
    labels: null # example list config: \[' ', 'a', 'b', 'c'\]

  tokenizer: # use for spe/bpe based tokenizer models
    update_tokenizer: true
    dir: /mnt/student-share/gabi-ion_licenta/tokenizers/5_normal_BAS+news_unigram/tokenizer_spe_unigram_v1024_max_5  # path to directory which contains either tokenizer.model (bpe) or vocab.txt (for wpe)
    type: bpe  # Can be either bpe (SentencePiece tokenizer) or wpe (WordPiece tokenizer)

  spec_augment:
    _target_: nemo.collections.asr.modules.SpectrogramAugmentation
    freq_masks: 2 # set to zero to disable it
    time_masks: 10 # set to zero to disable it
    freq_width: 27
    time_width: 0.05

  optim:
    name: adamw
    lr: 1e-4
    # optimizer arguments
    betas: [0.9, 0.98]
    weight_decay: 1e-3

    # scheduler setup
    sched:
      name: CosineAnnealing
      # scheduler config override
      warmup_steps: 3000
      warmup_ratio: null
      min_lr: 1e-6
      max_steps: 750000

trainer:
  devices: -1 # number of GPUs, -1 would use all available GPUs
  num_nodes: 1
  limit_train_batches: 72000    # setare sa nu mai primim eroare cu len(), numar secunde / batch_duration
  #max_epochs: 50
  max_steps: 240000 # computed at runtime if not set, cica trebuie schimbat la lhotse, din -1 in 55000
  val_check_interval: 0.2 # Set to 0.25 to check 4 times per epoch, or an int for number of iterations
  accelerator: auto
  strategy: auto
  use_distributed_sampler: false
  # strategy:
  #   _target_: lightning.pytorch.strategies.DDPStrategy
  #   gradient_as_bucket_view: true
  accumulate_grad_batches: 8
  gradient_clip_val: 1.0
  precision: bf16 # 16, 32, or bf16
  log_every_n_steps: 200  # Interval of logging.
  enable_progress_bar: True
  num_sanity_val_steps: 0 # number of steps to perform validation steps for sanity check the validation process before starting the training, setting to 0 disables it
  check_val_every_n_epoch: 1 # number of evaluations on validation every n epochs
  sync_batchnorm: false
  enable_checkpointing: False  # Provided by exp_manager
  logger: false  # Provided by exp_manager
  benchmark: false # needs to be false for models with variable-length speech input as it slows down training


exp_manager:
  exp_dir: /home/gion/nemo_experiments
  name: "FastConformer_CTC_XLARGE-10kh-v2"
  create_tensorboard_logger: true
  create_checkpoint_callback: true
  checkpoint_callback_params:
    # in case of multiple validation sets, first one is used
    monitor: "val_wer"
    mode: "min"
    save_top_k: 5
    always_save_nemo: True # saves the checkpoints as nemo files along with PTL checkpoints
  resume_if_exists: false
  resume_ignore_no_checkpoint: false


  

  create_wandb_logger: true
  wandb_logger_kwargs:
    name: "FastConformer_CTC_XLARGE-10k-v2"
    project: "Antrenari_Licenta"
